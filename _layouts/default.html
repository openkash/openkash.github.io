<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <meta name="google-site-verification" content="aVYlrZ30BWWuDfNWDCLbWfq1oEPrPOLiiF84sx5tLW4" />
  <link rel="canonical" href="{{ site.url }}/">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ site.url }}/">
  <meta property="og:title" content="{{ site.title }}">
  <meta property="og:description" content="{{ site.description }}">
  <meta property="og:image" content="https://onekash.org/images/logo.png">
  <meta property="og:image:width" content="512">
  <meta property="og:image:height" content="512">
  <meta property="og:site_name" content="OneKash Labs">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="{{ site.title }}">
  <meta name="twitter:description" content="{{ site.description }}">
  <meta name="twitter:image" content="https://onekash.org/images/logo.png">

  <link rel="icon" type="image/png" href="{{ '/assets/images/favicon.png' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "CollectionPage",
    "name": "OneKash Labs - Open Source Projects",
    "url": "https://openkash.github.io",
    "description": "Open-source developer tools and apps by OneKash Labs.",
    "creator": {
      "@type": "Organization",
      "name": "OneKash Labs",
      "url": "https://onekash.org"
    },
    "hasPart": [
      {
        "@type": "SoftwareApplication",
        "name": "KashCal",
        "url": "https://kashcal.github.io",
        "operatingSystem": "Android",
        "applicationCategory": "UtilitiesApplication",
        "description": "Offline-capable calendar with iCloud sync. Your schedule stays on your device.",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
      },
      {
        "@type": "SoftwareApplication",
        "name": "KashCake",
        "operatingSystem": "Android",
        "applicationCategory": "UtilitiesApplication",
        "description": "Birthday reminders from your contacts. Never miss a celebration.",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
      },
      {
        "@type": "SoftwareSourceCode",
        "name": "iCalDAV",
        "url": "https://icaldav.github.io",
        "codeRepository": "https://github.com/iCalDAV/iCalDAV",
        "programmingLanguage": "Kotlin",
        "description": "Kotlin CalDAV client with offline sync and conflict resolution."
      },
      {
        "@type": "SoftwareSourceCode",
        "name": "iCloud Calendar MCP Server",
        "codeRepository": "https://github.com/icloud-calendar-mcp/icloud-calendar-mcp",
        "programmingLanguage": "Kotlin",
        "description": "MCP server for iCloud Calendar. CLI-based calendar access for AI agents."
      },
      {
        "@type": "SoftwareSourceCode",
        "name": "SAP OData Explorer",
        "codeRepository": "https://github.com/openkash/sap-odata-explorer",
        "programmingLanguage": "TypeScript",
        "description": "Query SAP OData endpoints in plain English."
      },
      {
        "@type": "SoftwareSourceCode",
        "name": "AI Agent TDD Skill",
        "codeRepository": "https://github.com/openkash/ai-agent-tdd-skill",
        "description": "TDD skill for Claude Code. Explore, plan, test-first implement, verify."
      },
      {
        "@type": "SoftwareSourceCode",
        "name": "AI Agent Spec Skill",
        "codeRepository": "https://github.com/openkash/ai-agent-spec-skill",
        "description": "Feature specification skill for coding agents. Clarify what to build before writing code."
      },
      {
        "@type": "SoftwareSourceCode",
        "name": "AI Agent Dev Workflow",
        "codeRepository": "https://github.com/openkash/ai-agent-dev-workflow",
        "description": "Spec, Plan, Review, Implement, Verify; a complete AI development workflow plugin for Claude Code."
      },
      {
        "@type": "SoftwareSourceCode",
        "name": "SAP ATC Checker",
        "codeRepository": "https://github.com/openkash/sap-atc-checker",
        "programmingLanguage": "TypeScript",
        "description": "Run SAP ATC checks with any check variant via ADT API."
      },
      {
        "@type": "Dataset",
        "name": "RFC 5545 VEVENT Property Dependency Graph",
        "description": "Formal dependency graph for RFC 5545 VEVENT properties — 27 properties, 20 edges, merge-safety classifications.",
        "url": "https://doi.org/10.5281/zenodo.19299690",
        "sameAs": "https://github.com/iCalDAV/ical-dependency-graph",
        "subjectOf": {
          "@type": "ScholarlyArticle",
          "name": "iCalendar Property Dependencies",
          "url": "https://datatracker.ietf.org/doc/draft-kashyap-calext-ical-property-deps/"
        },
        "license": "https://creativecommons.org/licenses/by/4.0/",
        "creator": {
          "@type": "Person",
          "name": "Ravi Kashyap"
        },
        "distribution": [
          {
            "@type": "DataDownload",
            "encodingFormat": "application/x-yaml",
            "contentUrl": "https://raw.githubusercontent.com/iCalDAV/ical-dependency-graph/main/rfc5545-deps.yaml"
          },
          {
            "@type": "DataDownload",
            "encodingFormat": "application/json",
            "contentUrl": "https://raw.githubusercontent.com/iCalDAV/ical-dependency-graph/main/rfc5545-deps.json"
          }
        ]
      }
    ]
  }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  {{ content }}
</body>
</html>
